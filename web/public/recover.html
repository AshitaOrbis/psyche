<!DOCTYPE html>
<html>
<head>
  <title>Psyche Data Recovery</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
    pre { background: #f3f4f6; padding: 1rem; border-radius: 0.5rem; overflow: auto; max-height: 300px; font-size: 0.8rem; }
    button { padding: 0.75rem 1.5rem; background: #2563eb; color: #fff; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 1rem; margin: 0.5rem 0.5rem 0.5rem 0; }
    button:hover { background: #1d4ed8; }
    .success { color: #059669; font-weight: 600; }
    .error { color: #dc2626; font-weight: 600; }
    .info { color: #6b7280; font-size: 0.875rem; }
  </style>
</head>
<body>
  <h1>Psyche Data Recovery</h1>
  <p class="info">This page reads saved test data from this port's localStorage.</p>
  <div id="status"></div>
  <div id="actions" style="display:none">
    <button onclick="downloadData()">Download Data</button>
    <button onclick="copyData()">Copy to Clipboard</button>
  </div>
  <pre id="preview"></pre>

  <script>
    const statusEl = document.getElementById('status');
    const actionsEl = document.getElementById('actions');
    const previewEl = document.getElementById('preview');
    let recoveredData = null;

    // Try to read the psyche-store from localStorage
    const raw = localStorage.getItem('psyche-store');
    if (raw) {
      try {
        const parsed = JSON.parse(raw);
        // Zustand persist v5 wraps in { state: {...}, version: 0 }
        const state = parsed.state ?? parsed;
        const sessionCount = Object.keys(state.sessions || {}).length;
        const resultCount = Object.keys(state.results || {}).length;

        if (sessionCount > 0 || resultCount > 0) {
          recoveredData = {
            sessions: state.sessions || {},
            results: state.results || {},
            recoveredFrom: window.location.origin,
            recoveredAt: Date.now(),
          };

          statusEl.innerHTML = `
            <p class="success">Found data at ${window.location.origin}!</p>
            <p>${sessionCount} sessions, ${resultCount} completed results</p>
            <p>Completed instruments: ${Object.keys(state.results || {}).join(', ') || 'none'}</p>
            <p>In-progress instruments: ${Object.keys(state.sessions || {}).filter(k => !state.results?.[k]).join(', ') || 'none'}</p>
          `;
          actionsEl.style.display = 'block';
          previewEl.textContent = JSON.stringify(recoveredData, null, 2);
        } else {
          statusEl.innerHTML = '<p class="error">Store exists but has no test data.</p>';
        }
      } catch (e) {
        statusEl.innerHTML = `<p class="error">Failed to parse store: ${e.message}</p>`;
        previewEl.textContent = raw;
      }
    } else {
      statusEl.innerHTML = `<p class="error">No psyche-store found at ${window.location.origin}</p>`;
    }

    function downloadData() {
      if (!recoveredData) return;
      const blob = new Blob([JSON.stringify(recoveredData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `psyche-recovered-${window.location.port}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function copyData() {
      if (!recoveredData) return;
      navigator.clipboard.writeText(JSON.stringify(recoveredData, null, 2))
        .then(() => alert('Copied to clipboard!'));
    }
  </script>
</body>
</html>
